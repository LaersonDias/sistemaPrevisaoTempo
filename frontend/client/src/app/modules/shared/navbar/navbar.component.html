<nav class="navbar">

  <div class="logo-section">

    <h2>🌦️ WeatherPro</h2>

  </div>

  <div class="navbar-actions">

    <select
      (change)="changeLanguage($any($event.target).value)"
    >

      <option value="pt">

    </select>

    <button (click)="toggleTheme()">

    </button>

    <button (click)="logout()">
      Logout
    </button>

  </div>

</nav>
